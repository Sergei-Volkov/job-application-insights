services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../applications:/app/applications
    environment:
      DATABASE_URL: sqlite:///./app.db
      CSV_PATH: /app/applications/tracker/job_applications.csv
      DISCOVERY_SCRIPT_PATH: /app/discovery/job_finder.py
      DISCOVERY_CV_PATH: /app/applications/resumes/CV.tex
    env_file:
      - path: .env
        required: false

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
