server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # All /api/* requests are proxied to the FastAPI backend container.
    # The /api prefix is stripped so backend routes stay clean (e.g. /stats, /trend).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeout for discovery runs (max 900 s) plus headroom.
        proxy_read_timeout 920s;
    }

    # React Router: serve index.html for all unmatched paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
